<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trello-lite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0052cc; color: #fff; min-height: 100vh; }
    header { padding: 12px 16px; background: rgba(0,0,0,.15); }
    h1 { font-size: 1.25rem; font-weight: 700; }
    .board-container { display: flex; gap: 12px; padding: 16px; }
    .column { background: rgba(255,255,255,.15); border-radius: 6px; padding: 12px; min-width: 200px; }
    .column-header { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Trello-lite</h1>
  </header>
  <div class="board-container">
    <div class="column">
      <h2 class="column-header">To Do</h2>
    </div>
    <div class="column">
      <h2 class="column-header">Doing</h2>
    </div>
    <div class="column">
      <h2 class="column-header">Done</h2>
    </div>
  </div>
</body>
</html>
