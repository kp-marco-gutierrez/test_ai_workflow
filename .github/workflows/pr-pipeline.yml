name: PR Pipeline (deterministic gates + AI generation)

# Generic pipeline for AI-pipeline PRs (label `ai-tests`). It only:
#   * runs the project's tests DETERMINISTICALLY (detect stack), and
#   * triggers AI to GENERATE code / fixes / reviews.
# The AI never runs or judges tests — the deterministic jobs do. Loops advance
# automatically because Claude's commits push via the GitHub App token, which
# re-triggers this workflow (no PAT needed).
#
# Per push:
#   tests (deterministic)
#     ├─ first run + tests pass  -> FAIL (auto-passing tests)
#     ├─ tests fail              -> Claude develops & pushes        (loop)
#     └─ tests pass -> mark ready -> ChatGPT code review
#                                     ├─ REQUEST_CHANGES -> Claude addresses (loop)
#                                     └─ APPROVE -> formal approve -> full CI -> squash-merge

on:
  pull_request:
    types: [opened, labeled, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write # close the linked issue on merge
  id-token: write

concurrency:
  group: pr-pipeline-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  MAX_AI_COMMITS: "30" # loop safety cap (commits on the PR branch beyond main)

jobs:
  sync:
    name: Sync with main (auto-resolve conflicts before merge)
    if: contains(github.event.pull_request.labels.*.name, 'ai-tests')
    runs-on: ubuntu-latest
    outputs:
      refreshed: ${{ steps.s.outputs.refreshed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # Push with a PAT (if configured) so the refresh re-triggers a fresh
          # run on the up-to-date branch — where claude-code-action's
          # workflow-validation guard passes. A GITHUB_TOKEN push would NOT
          # re-trigger, leaving Claude self-skipping on the stale workflow.
          token: ${{ secrets.PIPELINE_PAT || github.token }}
      - name: Merge main into the PR branch
        id: s
        env:
          GH_TOKEN: ${{ github.token }}
          HAS_PAT: ${{ secrets.PIPELINE_PAT != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "Branch already contains main — nothing to sync."
            echo "refreshed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Branch is behind main — merging (conflicts resolved toward main)."
          # Resolve content conflicts toward main; the PR's own changes are then
          # re-applied by the develop loop (driven by this PR's tests) and the
          # verify gate proves they pass on the latest main before merge.
          if ! git merge --no-edit -X theirs origin/main; then
            echo "::error::Merge could not be auto-resolved (non-content conflict)."
            git merge --abort || true
            exit 1
          fi
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          if [ "$HAS_PAT" = "true" ]; then
            # PAT push re-triggers a fresh run on the current pipeline; let it
            # take over and skip the rest of THIS (stale-workflow) run.
            echo "refreshed=true" >> "$GITHUB_OUTPUT"
            bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "🔀 **Synced with \`main\`** (auto-resolved conflicts toward main). A fresh pipeline run is starting on the updated branch." || true
          else
            echo "::warning::PIPELINE_PAT not set — branch updated but the run was not re-triggered, so Claude may self-skip on the stale workflow. Add the PIPELINE_PAT secret for reliable auto-refresh."
            echo "refreshed=false" >> "$GITHUB_OUTPUT"
          fi

  tests:
    name: Run tests (deterministic)
    needs: sync
    if: contains(github.event.pull_request.labels.*.name, 'ai-tests') && needs.sync.outputs.refreshed != 'true'
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.run.outputs.passed }}
      stack: ${{ steps.run.outputs.stack }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the project's test suite
        id: run
        run: |
          set +e
          run_tests() {
            if [ -f package.json ]; then
              echo "stack=node" >> "$GITHUB_OUTPUT"
              npm ci || npm install || return 1
              if npx --no-install playwright --version >/dev/null 2>&1; then
                npx playwright install --with-deps chromium || true
              fi
              npm test
            elif [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f pytest.ini ]; then
              echo "stack=python" >> "$GITHUB_OUTPUT"
              if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pytest; fi
              pytest -q
            elif [ -f go.mod ]; then
              echo "stack=go" >> "$GITHUB_OUTPUT"
              go test ./...
            else
              echo "stack=none" >> "$GITHUB_OUTPUT"
              return 127
            fi
          }
          run_tests 2>&1 | tee test-output.txt
          code=${PIPESTATUS[0]}
          set -e
          echo "exit code: $code"
          if [ "$code" -eq 0 ]; then echo "passed=true" >> "$GITHUB_OUTPUT"; else echo "passed=false" >> "$GITHUB_OUTPUT"; fi

      - name: First-run gate (tests MUST fail before any implementation)
        if: github.event.action == 'labeled' || github.event.action == 'opened'
        run: |
          if [ "${{ steps.run.outputs.passed }}" = "true" ]; then
            echo "::error::Tests pass with no implementation — they are auto-passing. Gate failed."
            exit 1
          fi
          echo "Tests fail as required on the first run."

      - name: Comment — tests result
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          pr=${{ github.event.pull_request.number }}
          if [ "${{ steps.run.outputs.passed }}" = "true" ]; then
            bash scripts/retry.sh gh pr comment "$pr" -b "🧪 **Tests** passed (deterministic gate) → proceeding to code review. ([run]($RUN_URL))" || true
          else
            bash scripts/retry.sh gh pr comment "$pr" -b "🧪 **Tests** failing as expected → next: AI-Red-Team checks the tests against the spec, then Claude implements. ([run]($RUN_URL))" || true
          fi

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 3

  test_qa:
    name: AI-Red-Team review (tests vs spec)
    needs: tests
    # Only while authoring tests (tests still failing) and not yet approved.
    if: needs.tests.outputs.passed == 'false' && !contains(github.event.pull_request.labels.*.name, 'tests-reviewed')
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.tr.outputs.verdict }}
      review: ${{ steps.tr.outputs.review }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Comment — test review started
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "🔴 **Test QA** — ChatGPT is checking the tests against the spec… ([run]($RUN_URL))" || true
      - name: ChatGPT reviews tests vs spec
        id: tr
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
        run: |
          verdict="$(python3 scripts/chatgpt_review.py --mode tests)"
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          { echo "review<<RV_EOF"; cat review.md; echo "RV_EOF"; } >> "$GITHUB_OUTPUT"
      - name: Post test review
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} --body-file review.md || true
      - name: Mark tests reviewed (on approve)
        if: steps.tr.outputs.verdict == 'APPROVE'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label tests-reviewed
          bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "🔴 **Test QA** verdict: ✅ tests match the spec → Claude will implement." || true
      - name: Note request-changes
        if: steps.tr.outputs.verdict == 'REQUEST_CHANGES'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "🔴 **Test QA** verdict: 📝 tests need changes → Claude will revise the tests." || true

  fix-tests:
    name: Claude revises the tests (AI1)
    needs: [tests, test_qa]
    if: needs.test_qa.outputs.verdict == 'REQUEST_CHANGES'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Comment — fixing tests
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "✍️ **Revise tests** — Claude (AI1) is addressing the test review… ([run]($RUN_URL))" || true
      - name: Claude edits the tests
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          claude_args: >-
            ${{ vars.CLAUDE_MODEL != '' && format('--model {0} ', vars.CLAUDE_MODEL) || '' }}--allowed-tools "Read,Write,Edit,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(python3:*)"
          prompt: |
            You are AI1 on PR #${{ github.event.pull_request.number }}. The
            AI-Red-Team (ChatGPT) reviewed the generated tests against the spec
            and requested changes:

            ${{ needs.test_qa.outputs.review }}

            Address the valid points by editing the TESTS and/or the .feature
            spec only. Write NO implementation code — the tests must still FAIL
            the dry run. Do not skip/xfail. Run
            `python3 scripts/validate_spec.py features/`, then commit to this PR
            branch (${{ github.event.pull_request.head.ref }}) and push.

  develop:
    name: Claude develops (until tests pass)
    needs: [tests, test_qa]
    # Implement only once the tests have been reviewed (label present from a
    # prior round) or were just approved in this run.
    if: |
      always() &&
      needs.tests.result == 'success' &&
      needs.tests.outputs.passed == 'false' &&
      (contains(github.event.pull_request.labels.*.name, 'tests-reviewed') || needs.test_qa.outputs.verdict == 'APPROVE')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Loop safety cap
        run: |
          n=$(git rev-list --count origin/main..HEAD || echo 0)
          echo "AI commits so far: $n (cap ${MAX_AI_COMMITS})"
          if [ "$n" -gt "${MAX_AI_COMMITS}" ]; then
            echo "::error::Loop cap reached ($n > ${MAX_AI_COMMITS}). Stopping."
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          name: test-output
      - name: Load test output
        id: log
        run: |
          { echo "log<<TESTLOG_EOF"; tail -n 200 test-output.txt; echo "TESTLOG_EOF"; } >> "$GITHUB_OUTPUT"
      - name: Comment — develop started
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "🛠️ **Develop** — Claude is implementing to make the tests pass… ([run]($RUN_URL))" || true
      - name: Claude implements
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The pipeline is bot-driven (AI creates/labels/pushes), so the
          # triggering actor is a bot — allow it.
          allowed_bots: "*"
          claude_args: >-
            ${{ vars.CLAUDE_MODEL != '' && format('--model {0} ', vars.CLAUDE_MODEL) || '' }}--allowed-tools "Read,Write,Edit,Glob,Grep,Bash"
          prompt: |
            You are AI2 (the implementer) on PR #${{ github.event.pull_request.number }}.
            The committed BDD tests currently FAIL because the app does not exist
            yet. Write the app AND whatever project scaffold is needed so the
            tests pass.

            - Build whatever the spec/tests require. If the issue targets GitHub
              Pages, it is a static client-side site: entry point index.html at
              the repo root, no backend, no build step, relative asset paths.
            - Create the package manifest + test config for the framework the
              tests use, and wire the project's standard test command (e.g.
              `npm test`) to run them, installing what they need.
            - Do NOT modify the tests or the .feature spec.
            - You do NOT need to run the tests yourself — the pipeline runs them
              deterministically and will re-invoke you if they still fail.

            Latest deterministic test output (tail):
            ```
            ${{ steps.log.outputs.log }}
            ```

            Commit everything (scaffold + implementation) to this PR branch
            (${{ github.event.pull_request.head.ref }}) and push.

      - name: Adjust PR title to reflect the implementation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr=${{ github.event.pull_request.number }}
          title=$(gh pr view "$pr" --json title -q .title)
          # Strip the "AI1: tests for #<issue> " prefix to get the feature name.
          feature=$(echo "$title" | sed -E 's/^AI1: tests for #[0-9]+ +//')
          if [ "$feature" != "$title" ] && [ -n "$feature" ]; then
            gh pr edit "$pr" --title "feat: $feature"
            bash scripts/retry.sh gh pr comment "$pr" -b "📝 PR title updated to \`feat: $feature\` (implementation added)." || true
          fi

  review:
    name: Code review (ChatGPT) + mark ready
    needs: tests
    if: needs.tests.outputs.passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.cr.outputs.verdict }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Remove draft (tests pass)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr ready ${{ github.event.pull_request.number }} || true
      - name: Comment — review started
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "📖 Tests green — PR marked **ready**. 👀 **Code review** — ChatGPT is reviewing the implementation… ([run]($RUN_URL))" || true
      - name: ChatGPT code review
        id: cr
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          GH_TOKEN: ${{ github.token }}
          REVIEW_ROUNDS_CAP: "2"
        run: |
          verdict="$(python3 scripts/chatgpt_review.py --mode code)"
          # Convergence guard: tests pass, so the change is correct. If the
          # reviewer keeps requesting non-blocking changes, accept it after a
          # few rounds instead of looping forever.
          if [ "$verdict" = "REQUEST_CHANGES" ]; then
            rounds=$(gh pr view ${{ github.event.pull_request.number }} --json comments \
              -q '[.comments[]|select(.body|test("Code review\\*\\* verdict:.*REQUEST_CHANGES"))]|length')
            echo "prior REQUEST_CHANGES rounds: $rounds (cap ${REVIEW_ROUNDS_CAP})"
            if [ "$rounds" -ge "${REVIEW_ROUNDS_CAP}" ]; then
              verdict="APPROVE"
              { echo ""; echo "_Note: review-round cap (${REVIEW_ROUNDS_CAP}) reached — approving with the remaining suggestions as non-blocking, since the tests pass._"; } >> review.md
            fi
          fi
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          { echo "review<<REVIEW_EOF"; cat review.md; echo "REVIEW_EOF"; } >> "$GITHUB_OUTPUT"
      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} --body-file review.md || true
      - name: Comment — review verdict
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.cr.outputs.verdict }}" = "APPROVE" ]; then
            bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "👀 **Code review** verdict: ✅ APPROVE → approving, running full CI, and squash-merging." || true
          else
            bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "👀 **Code review** verdict: 📝 REQUEST_CHANGES → Claude will address the comments." || true
          fi
      - name: Save review for the address step
        if: steps.cr.outputs.verdict == 'REQUEST_CHANGES'
        uses: actions/upload-artifact@v4
        with:
          name: code-review
          path: review.md
          retention-days: 3

  address:
    name: Claude addresses the review
    needs: review
    if: needs.review.outputs.verdict == 'REQUEST_CHANGES'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Loop safety cap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          n=$(git rev-list --count origin/main..HEAD || echo 0)
          echo "AI commits so far: $n (cap ${MAX_AI_COMMITS})"
          if [ "$n" -gt "${MAX_AI_COMMITS}" ]; then
            bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "⛔ Code-review loop cap reached ($n > ${MAX_AI_COMMITS} commits). Stopping for human review." || true
            echo "::error::Review/address loop cap reached ($n > ${MAX_AI_COMMITS})."
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          name: code-review
      - name: Load review
        id: rv
        run: |
          { echo "review<<RV_EOF"; cat review.md; echo "RV_EOF"; } >> "$GITHUB_OUTPUT"
      - name: Comment — address started
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/retry.sh gh pr comment ${{ github.event.pull_request.number }} -b "✍️ **Address review** — Claude is editing the implementation to address the review comments… ([run]($RUN_URL))" || true
      - name: Claude edits the code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The pipeline is bot-driven (AI creates/labels/pushes), so the
          # triggering actor is a bot — allow it.
          allowed_bots: "*"
          claude_args: >-
            ${{ vars.CLAUDE_MODEL != '' && format('--model {0} ', vars.CLAUDE_MODEL) || '' }}--allowed-tools "Read,Write,Edit,Glob,Grep,Bash"
          prompt: |
            You are AI2 on PR #${{ github.event.pull_request.number }}. ChatGPT
            (code reviewer) requested changes:

            ${{ steps.rv.outputs.review }}

            Address the valid points by editing the implementation. Do NOT modify
            the tests or the .feature spec, and do not weaken anything to pass.
            The pipeline re-runs the tests and re-reviews automatically. Commit
            to this PR branch (${{ github.event.pull_request.head.ref }}) and push.

  approve-merge:
    name: Approve, run full CI, squash-merge
    needs: review
    if: needs.review.outputs.verdict == 'APPROVE'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Post formal approval
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr review ${{ github.event.pull_request.number }} --approve --body "Approved by the AI code-review stage."
      - name: Full deterministic CI (tests must pass)
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            if npx --no-install playwright --version >/dev/null 2>&1; then
              npx playwright install --with-deps chromium || true
            fi
            npm test
          elif [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f pytest.ini ]; then
            if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pytest; fi
            pytest -q
          elif [ -f go.mod ]; then
            go test ./...
          else
            echo "::error::No runnable test stack at merge time."; exit 1
          fi
      - name: Squash merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr=${{ github.event.pull_request.number }}
          if [ "$(gh pr view "$pr" --json state -q .state)" = "MERGED" ]; then
            echo "PR already merged."; exit 0
          fi
          gh pr merge "$pr" --squash
          # Delete the head branch via the API. We avoid `gh pr merge
          # --delete-branch` because its local git cleanup fails in CI (the
          # checkout has no local `main`): "origin/main is not a commit".
          gh api -X DELETE \
            "repos/${{ github.repository }}/git/refs/heads/${{ github.event.pull_request.head.ref }}" \
            || echo "branch already deleted"
          # Deterministically close the linked issue. Keyword auto-close
          # ("Closes #N" in the PR body) is unreliable for bot-authored PRs
          # squash-merged via the API, so close it explicitly.
          issue=$(gh pr view "$pr" --json body -q .body \
            | grep -oiE 'clos(e|es|ed)[[:space:]]+#[0-9]+' | grep -oE '[0-9]+' | head -1)
          if [ -n "$issue" ]; then
            bash scripts/retry.sh gh issue edit "$issue" --remove-label in-development || true
            gh issue close "$issue" --reason completed -c "✅ Implemented and merged in #$pr — pipeline complete." || true
          fi
          bash scripts/retry.sh gh pr comment "$pr" -b "🚀 **Merged** — full CI passed, PR squash-merged${issue:+ and issue #$issue closed}. Pipeline complete." || true
