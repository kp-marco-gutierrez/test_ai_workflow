name: Spec Intake (Issue -> Tests)

# Issue-driven entry to the AI-only pipeline.
# A BDD spec is filed as a GitHub Issue (see .github/ISSUE_TEMPLATE/bdd-spec.md).
# Generation is triggered by a human commenting `@go-develop` on the issue —
# the spec is authored first, reviewed, then explicitly kicked off.
#
# This workflow runs the spec guardrail (BDD format + task size). If it passes,
# AI1 saves the .feature file and generates pytest-bdd tests, then opens a PR.
# If it fails, the validator output (including a suggested breakdown) is
# commented back on the issue.
#
# Uses claude-code-action@v1, which supports `issue_comment` events.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  intake:
    name: Validate spec and generate tests
    # Only on issue comments (not PR comments) that contain the trigger phrase.
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@go-develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Comment — pipeline started
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/retry.sh gh issue comment ${{ github.event.issue.number }} -b "🚦 \`@go-develop\` received — **Spec intake (AI1)** validating the spec and generating tests… ([run]($RUN_URL))" || true

      - name: Spec intake (AI1)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            ${{ vars.CLAUDE_MODEL != '' && format('--model {0} ', vars.CLAUDE_MODEL) || '' }}--allowed-tools "Read,Write,Edit,Glob,Grep,Bash(python3:*),Bash(git:*),Bash(gh:*)"
          prompt: |
            You are the spec-intake agent (AI1) in an automated BDD pipeline.

            A human commented `@go-develop` on issue
            #${{ github.event.issue.number }} to request test generation. The
            issue BODY contains a BDD spec inside a ```gherkin code block. Do the
            following, in order:

            1. Extract the Gherkin spec from the issue body — the `Feature:`
               block. Strip the markdown code fences and any <placeholder> text
               the author left unfilled.
            2. Save it to features/<slug>.feature, where <slug> is a kebab-case
               name derived from the Feature title.
            3. GUARDRAIL — run exactly:
                 python3 scripts/validate_spec.py features/<slug>.feature
               - If it exits non-zero (invalid BDD format, or task too large):
                 post a comment on issue #${{ github.event.issue.number }} with
                 the full validator output (it includes any suggested breakdown),
                 ask the author to revise the issue, delete the .feature file you
                 created, and STOP. Do NOT generate tests or open a PR.
               - If it passes, continue.
            4. Generate executable BDD tests that exercise EVERY scenario and
               step in the spec, asserting the Then outcomes precisely. Choose
               the test stack that fits the app the issue describes — e.g. a
               GitHub Pages app is a static, client-side site, so test it by
               loading index.html in a headless browser. Keep the tests next to
               the spec under a conventional location for that stack.
            5. The tests run against an app that does NOT exist yet, so they
               MUST fail now (the "dry run must fail" gate) — do not skip/xfail
               or weaken them. Write ONLY the tests and the .feature spec. Do
               NOT write the implementation OR any project scaffold (package
               manifest, test config, index.html, etc.) — AI2 creates all of
               that, wires the project's standard test command to run your
               tests, and makes them pass.
            6. Open a DRAFT pull request adding the .feature file and the tests
               (use `gh pr create --draft`). It MUST be a draft so it can't be
               merged before it has passed the dry-run gate and AI-Red-Team
               review — leave it for a human (or a later pipeline stage) to mark
               ready.
                 - title: "AI1: tests for #${{ github.event.issue.number }} <Feature>"
                 - body: "Closes #${{ github.event.issue.number }}". Note the
                   tests are expected to fail until AI2 implements the code.
                 - Add the label `ai-tests` to the PR
                   (`gh pr edit <num> --add-label ai-tests`) so the Test QA
                   pipeline (dry-run gate + AI-Red-Team review) runs on it.
            7. Comment the PR link back on the issue.
