name: Generate BDD Tests

# Step 1 -> Step 2 of the AI-only pipeline.
# On a push that touches a .feature file, run the spec guardrail (BDD format +
# task sizing). If the spec is well-formed AND carries the @generate-tests tag,
# AI1 generates pytest-bdd step definitions and opens a PR with them.
#
# NOTE: anthropics/claude-code-action@v1 does NOT support `push` events, so the
# generation step uses the event-agnostic claude-code-base-action to write the
# tests, then peter-evans/create-pull-request opens the PR.

on:
  push:
    paths:
      - "**.feature"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  guardrail:
    name: Spec guardrail (format + size)
    runs-on: ubuntu-latest
    outputs:
      tagged: ${{ steps.detect.outputs.tagged }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all specs (BDD format + task size)
        run: python3 scripts/validate_spec.py features/

      - name: Detect @generate-tests specs
        id: detect
        run: |
          tagged="$(python3 scripts/validate_spec.py --list-tagged features/)"
          echo "Tagged specs:"; echo "$tagged"
          {
            echo "tagged<<EOF"
            echo "$tagged"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  generate:
    name: AI1 — generate pytest-bdd tests
    needs: guardrail
    if: needs.guardrail.outputs.tagged != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate step definitions (AI1)
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Read,Write,Edit,Glob,Grep,Bash(python3:*)"
          prompt: |
            You are AI1 (the test author) in an automated BDD pipeline.

            These specs are tagged @generate-tests and have passed the spec
            guardrail (valid BDD format, right-sized):
            ${{ needs.guardrail.outputs.tagged }}

            For each tagged .feature file, generate pytest-bdd step definitions:

            - Create tests/step_defs/test_<feature_slug>.py.
            - Bind the scenarios with `scenarios('../../features/<file>.feature')`
              (or per-scenario @scenario decorators) so EVERY scenario and step
              in the spec is implemented.
            - Use @given/@when/@then matching the exact step text. Parse values
              out of the steps with parsers.parse / cfparse.
            - Tests must call into the INTENDED implementation modules (e.g.
              `from app.auth import login`) that DO NOT EXIST YET. Do not write
              any implementation code — that is AI2's job (a later step).
            - Assertions must reflect the Then steps precisely.

            The generated tests MUST fail when run now (no implementation
            exists) — that is the required "dry run must fail" gate. Do NOT make
            tests pass, skip, or xfail. A collection/import error is acceptable
            as a failure.

            Only write files under tests/. Do not edit any .feature file or the
            guardrail script. Do not run git.

      - name: Open PR with generated tests
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai1/generated-tests-${{ github.run_id }}
          base: ${{ github.ref_name }}
          title: "AI1: generated pytest-bdd tests"
          commit-message: "AI1: generate pytest-bdd step definitions from specs"
          add-paths: |
            tests/**
          body: |
            Generated by **AI1** from the `@generate-tests` specs:

            ```
            ${{ needs.guardrail.outputs.tagged }}
            ```

            These tests are **expected to fail** until AI2 implements the code
            (the "dry run must fail" gate, step 4 of the pipeline).
