name: PAT Preflight
# Temporary: verifies PIPELINE_PAT is a valid token with write access. Removed after.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PIPELINE_PAT
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "::error::PIPELINE_PAT is empty"; exit 1; fi
          echo "Authenticated as: $(gh api user -q .login)"
          perms=$(gh api repos/${{ github.repository }} -q '.permissions | "admin=\(.admin) push=\(.push) pull=\(.pull)"')
          echo "Repo permissions for this token: $perms"
          case "$perms" in
            *push=true*|*admin=true*) echo "OK: token has write access." ;;
            *) echo "::error::Token lacks write (push) access — runs will still be gated / pushes will fail."; exit 1 ;;
          esac
