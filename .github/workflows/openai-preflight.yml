name: OpenAI Preflight

# Temporary: verifies the OPENAI_API_KEY secret works and the chosen model is
# usable. Removed once confirmed.

on:
  push:
    branches: [pipeline/test-qa]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check OpenAI access and model
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not set"; exit 1
          fi
          echo "Testing model: $OPENAI_MODEL"
          code=$(curl -sS -o resp.json -w '%{http_code}' \
            https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$OPENAI_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],\"max_tokens\":5}")
          echo "HTTP $code"
          if [ "$code" = "200" ]; then
            echo "OK: model '$OPENAI_MODEL' is usable with this key."
            exit 0
          fi
          echo "FAIL: model '$OPENAI_MODEL' is not usable. Response body:"
          cat resp.json; echo
          echo "----- chat-capable models available on this key -----"
          curl -sS https://api.openai.com/v1/models \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
          | python3 -c "import sys,json; d=json.load(sys.stdin); ids=sorted(m['id'] for m in d.get('data',[])); print(chr(10).join(i for i in ids if any(k in i for k in ('gpt','o1','o3','o4'))))" || true
          exit 1
